<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finska Tracker</title>
    <script defer type="module" src="app.js"></script>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div id="welcomeOptions" style="display:none;">
        <p>Welcome back!</p>
        <button id="continueGame">continue</button>
        <button id="newGame">new game</button>
        <br>
    </div>
    <div id="addPlayers" style="display:none;">
        <div id="addedPlayersDiv" style="display:none;">
            Added players:
            <ul id="addedPlayers"></ul>
        </div>
        <label id="playerNameLabel" for="playerName">Add a player:</label>
        <br>
        <input type="text" id="playerName" placeholder="John Johnson" autocomplete="off" spellcheck="false">
        <button id="addPlayer">add</button>
        <button id="doneAddPlayer" disabled="disabled">done</button>
        <br>
        <small id="errorAddPlayer" style="color: red; display:none;"></small>
        <button id="editAddPlayer" disabled="disabled">edit</button>
        <button id="cancelEditAddPlayer" style="display:none;">discard</button>
        <button id="applyEditAddPlayer" style="display:none;">apply</button>
        <br>
        <div id="startScoreDiv" style="display:none;">
            <label id="startScoreLabel" for="startScore">Choose their start score:</label>
            <br>
            <button id="addPlayer">0</button>
            <button id="addPlayer">25</button>
            <input type="number" id="startScore" autocomplete="off" class="input-number">
            <button id="enterStartScore">enter</button>
        </div>
        <br>
    </div>
    <div id="gameScreen" style="display:none;">
        <div id="upcoming">
            <p>Up next:</p>
            <p>followed by:</p>
        </div>
        <div id="scoreboard">
            <table id="scoreboardTable" style="border: l;">
                <thead>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                </thead>
                <tbody>
                </tbody>
            </table>
            <button id="editGame">edit</button>
            <button id="addPlayerDuring">add</button>
            <button id="removePlayerDuring">remove</button>
        </div>
        <br>
        <div id="inputPanel">
            <button id="swapInput" name="total">Swap to pins</button>
            <div id="inputPins" style="display:none;">
                <p>Select pins:</p>
                <div id="inputPinsGrid" class="grid-container-numpad">
                    <button class="grid-item">1</button>
                    <button class="grid-item">2</button>
                    <button class="grid-item">3</button>
                    <button class="grid-item">4</button>
                    <button class="grid-item">5</button>
                    <button class="grid-item">6</button>
                    <button class="grid-item">7</button>
                    <button class="grid-item">8</button>
                    <button class="grid-item">9</button>
                    <button class="grid-item">10</button>
                    <button class="grid-item">11</button>
                    <button class="grid-item">12</button>
                </div>
                <button id="missPins">miss!</button>
                <button id="enterPins">enter</button>
            </div>
            <div id="inputTotal">
                <p>Enter total score:</p>
                <div id="inputTotalGrid" class="grid-container-numpad">
                    <button class="grid-item">1</button>
                    <button class="grid-item">2</button>
                    <button class="grid-item">3</button>
                    <button class="grid-item">4</button>
                    <button class="grid-item">5</button>
                    <button class="grid-item">6</button>
                    <button class="grid-item">7</button>
                    <button class="grid-item">8</button>
                    <button class="grid-item">9</button>
                </div>
                <button id="missTotal">miss!</button>
                <button id="enterTotal">enter</button>
            </div>
            <button id="skip">skip</button>
            <button id="sitout">sitout</button>
        </div>
        <br>
    </div>
    <div id="changeRulesScreen" style="display:none;">
        <br>
    </div>
    
    <div id="winScreen" style="display:none;">
        <p>We have a winner!</p>
        <button id="winContinue">continue</button>
        <button id="winFinish">finish</button>
        <div id="exitConfirm">
            <p>Sure you want to finish up?</p>
            <button id="finishYeah">yeah</button>
            <button id="finishNah">nah</button>
        </div>
        <br>
    </div>
    <div id="loseScreen" style="display:none;">
        <p>Tough day at the office?</p>
        <button id="loseContinue">continue</button>
        <button id="loseFinish">finish</button>
        <br>
    </div>
    <div id="editGameRules" style="display:none;">
        <button id="alterGameRules">alter</button>
        <div id="editGameRulesOptions">
            <button id="classic">classic</button>
            <button id="fast">fast</button>
            <button id="custom">custom</button>
        </div>
        <div id="editGameRulesScreen">
            <label id="missLimitLabel" for="missLimit">Miss limit:</label>
            <input type="number" id="missLimit" autocomplete="off" class="input-number">
            <br>
            <label id="elimDurationLabel" for="elimDuration">Elimination duration:</label>
            <input type="number" id="elimDuration" autocomplete="off" class="input-number">
            <button id="elimDurationInf">forever!</button>
            <br>
            <label id="winScoreLabel" for="winScore">Win score:</label>
            <input type="number" id="winScore" autocomplete="off" class="input-number">
            <br>
            <label id="resetScoreLabel" for="resetScore">Overshoot score:</label>
            <input type="number" id="resetScore" autocomplete="off" class="input-number">
            <br>
            <button id="confirmRules">confirm</button>
            <button id="cancelRules">cancel</button>
        </div>
        <small id="chosenRules"></small>
    </div>
</body>
</html>
