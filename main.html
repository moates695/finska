<!DOCTYPE html>
<html lang="en-AU">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script defer src="main.js"></script>
<link href="main.css" rel="stylesheet">
<head>
    <title>Finska Tracker</title>
</head>
<body onload="checkStorage()">
    <div id="welcomeScreen">  
        <div id="noLocalStorage" style="display:none;">
            <p>Sorry, your browser does not support local storage!</p>
        </div>
        <div id="gameChoice" style="display:none;">
            <button id="newGame">new game</button><br>
            <button id="continueGame">continue</button>
        </div>
    </div>
    
    <div id="addPlayers" style="display:none;">
        <label id="playerNameLabel" for="playerName">Add a player:</label><br>
        <input type="text" id="playerName" placeholder="John Johnson" autocomplete="off">
        <button id="addPlayer">Add</button>
        <button id="doneAddPlayer" disabled>Done</button><br>
        <small id="playerExists" style="color:red;display:none;"></small>
        <div id="startScore">
            <div id="startScoreOption" style="display:none;">
                <label id="changeStartScoreLabel" for="changeStartScore"></label>
                <button id="changeStartScore">Change</button>
            </div>
            <div id="startScoreInputs" style="display:none;">
                <label id="startScoreLabel" for="zeroStartScore">Choose their start score:</label><br>
                <button id="zeroStartScore">0</button>
                <button id="midStartScore">25</button>
                <input type="number" id="customStartScore" placeholder="Custom" autocomplete="off">
            </div>
        </div>
        <br>
    </div>

    <div id="gameScreen" style="display:none;">
        <div id="upcoming">
            <div id="upNext">
                <p id="upNextPreamble"></p>
            </div>
            <div id="upAfter">
                <p id="upNextPreamble"></p>
            </div>
        </div>
        <div id="scoreboard">
            <p>Scoreboard</p>
        </div>
        <br>
        <div id="scoreInterface">
            <label id="playerScoreLabel" for="playerScore">Enter player score:</label><br>
            <input type="number" id="playerScore" autocomplete="off">
            <button id="addScore">Enter</button>
            <small id="scoreInvalid" style="color:red;display:none;"></small>
            <br>
            <button id="miss">Miss!</button>
            <br>
            <button id="addPlayerMidgame">Add Player</button>
        </div>
    </div>
    
    <div id="winScreen" style="display:none;">
        <div id="winScreenPrompt">
            <p id="winMessage"></p>
            <button id="playOn">Continue</button>
            <button id="fin">Fin</button>
        </div>
        <div id="ensureFin" style="display:none;">
            <label id="yesFinLabel">Are you sure?</label>
            <br>
            <button id="yesFin">Yeah</button>
            <button id="cancelFin">Nah</button>
        </div>
    </div>

    <div id="loseScreen" style="display:none;">
        <p id="loseMessage">Tough day huh!?</p>
        <!-- Continue on but with all players back in -->
        <button id="finLose">Fin</button>
    </div>

    <button id="editGameRuleBtn">Edit Game Rules</button>
    <small id="chosenRuleDisplay" style="color:blue;display:none;"></small>
    
    <div id="gameRuleEditor" style="display:none;">
        <label id="gameRulesSelectLabel" for="classicRules">Choose a rule set:</label><br>
        <button id="classicRules">Classic</button>
        <button id="fastRules">Fast</button>
        <button id="customRules">Custom</button>
        <br>
        <button id="rulesBack">Back</button>
        <br>
    </div>
    
</body>
