<!DOCTYPE html>
<html lang="en-AU">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script defer src="main.js"></script>
<head>
    <title>Finska Tracker</title>
</head>
<body onload="checkStorage()">
    <div id="welcomeScreen">  
        <div id="noLocalStorage" style="display:none;">
            <p>Sorry, your browser does not support local storage!</p>
        </div>
        <div id="gameChoice" style="display:none;">
            <button id="newGame">new game</button><br>
            <button id="continueGame">continue</button>
        </div>
        <div id="addPlayers" style="display:none;">
            <label id="playerNameLabel" for="playerName">Add a player:</label><br>
            <input type="text" id="playerName" placeholder="John Johnson" autocomplete="off">
            <button id="addPlayer">Add</button>
            <button id="doneAddPlayer" disabled>Done</button><br>
            <small id="playerExists" style="color:red;display:none;"></small>
        </div>
    </div>
    
    <div id="gameScreen">
        <div id="upNext">

        </div>
        <div id="leaderboard">

        </div>
        <div id="scoreInterface">
            <div id="scoreNumeric">
                <label id="playerScoreLabel" for="playerScore">Enter player's score:</label><br>
                <input type="number" id="playerScore" autocomplete="off">
                <button id="addScore">Enter</button>
                <small id="scoreInvalid" style="color:red;display:none;">Hey there, valid numbers are 0 ~ 78</small>
                <br>
                <button id="miss">Miss!</button>
            </div>
            <div id="scoreGraphical">

            </div>
        </div>
    </div>
    
</body>
